name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linters
        run: pip install flake8 black

      - name: Check formatting with black
        run: black --check --line-length 120 src/ scripts/ tests/

      - name: Lint with flake8
        run: flake8 src/ scripts/ tests/ --max-line-length 120 --ignore=E501,W503,E203,F401,F841,F541,E402

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-cov

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -x

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sku110k-hybrid:test .

      - name: Verify Docker image
        run: docker run --rm sku110k-hybrid:test python -c "from src.models.hybrid import HybridDetector; print('OK')"
